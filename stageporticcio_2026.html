<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours — Club Blitzstream</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 40% 30%,#0e0e1c 0%,#050507 100%);min-height:100vh;font-family:'Raleway',sans-serif;padding:24px 12px 60px;display:flex;flex-direction:column;align-items:center;gap:0}

/* ── PAGE HEADER ── */
.page-header{width:640px;max-width:100%;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px}
.page-brand{display:flex;align-items:center;gap:10px}
.page-brand-icon{font-size:24px;color:#d4a843}
.page-brand-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#e8d5a0}
.page-brand-name em{font-style:italic;font-weight:400;color:#d4a843}
.page-brand-sub{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(212,168,67,.45);margin-top:3px}

/* ── CARD ── */
.card{width:640px;max-width:100%;background:linear-gradient(155deg,#17172a 0%,#0e0e18 60%,#0b0b14 100%);border-radius:22px;overflow:hidden;position:relative;box-shadow:0 0 0 1px rgba(212,168,67,.18),0 0 60px rgba(212,168,67,.06),0 30px 90px rgba(0,0,0,.7);margin-bottom:16px}
.card::before{content:'';display:block;height:2.5px;background:linear-gradient(90deg,transparent,#d4a843,#f0c96a,#d4a843,transparent)}

/* ── POSITIONS GRID ── */
.positions{padding:24px 28px 28px;display:flex;flex-direction:column;gap:32px}

/* ── SINGLE POSITION ── */
.pos-block{display:flex;flex-direction:column;gap:14px}
.pos-header{display:flex;align-items:center;gap:10px}
.pos-num{width:22px;height:22px;border-radius:50%;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#d4a843;flex-shrink:0}
.pos-label{font-family:'Playfair Display',serif;font-size:13px;color:#c8bea4;font-style:italic;flex:1}
.turn-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.turn-dot.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:0 0 0 1.5px rgba(0,0,0,.2),0 0 8px rgba(255,255,255,.25)}
.turn-dot.b{background:radial-gradient(circle at 35% 35%,#555,#111);box-shadow:0 0 0 1.5px rgba(255,255,255,.12)}
.turn-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,190,164,.5)}

/* ── BOARD ── */
.board-wrap{display:grid;grid-template-columns:18px 1fr;grid-template-rows:1fr 18px;width:min(380px,100%);align-self:center}
.rlabels{grid-column:1;grid-row:1;display:flex;flex-direction:column}
.rl{flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;color:#38385a;user-select:none}
.board{grid-column:2;grid-row:1;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);aspect-ratio:1;border-radius:4px;overflow:hidden;box-shadow:0 0 0 1px rgba(0,0,0,.5),0 8px 30px rgba(0,0,0,.6)}
.flabels{grid-column:2;grid-row:2;display:grid;grid-template-columns:repeat(8,1fr);padding-top:3px}
.fl{text-align:center;font-size:9px;color:#38385a;user-select:none}
.sq{display:flex;align-items:center;justify-content:center;overflow:hidden}
.sq.lt{background:#f0d9b5}.sq.dk{background:#b58863}
.sq svg{width:82%;height:82%;pointer-events:none}

/* ── SEPARATOR ── */
.pos-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.1),transparent);margin:0}

/* ── COMMENT BOX ── */
.comment-section{display:flex;flex-direction:column;gap:8px}
.comment-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(212,168,67,.4)}
.comment-input{background:rgba(255,255,255,.03);border:1px solid rgba(212,168,67,.15);border-radius:10px;padding:12px 14px;font-family:'Raleway',sans-serif;font-size:12px;color:#c8bea4;outline:none;resize:vertical;min-height:80px;width:100%;line-height:1.6;transition:border-color .2s}
.comment-input::placeholder{color:rgba(200,190,164,.25);font-style:italic}
.comment-input:focus{border-color:rgba(212,168,67,.4);background:rgba(255,255,255,.04)}

/* ── SUBMIT SECTION ── */
.submit-section{width:640px;max-width:100%;display:flex;flex-direction:column;gap:12px;align-items:center}
.name-row{display:flex;gap:10px;width:100%}
.name-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:10px;padding:10px 14px;font-family:'Raleway',sans-serif;font-size:12px;color:#c8bea4;outline:none;transition:border-color .2s}
.name-input::placeholder{color:rgba(200,190,164,.3);font-style:italic}
.name-input:focus{border-color:rgba(212,168,67,.4)}
.btn-row{display:flex;gap:10px;width:100%}
.btn-copy{background:linear-gradient(135deg,#d4a843,#c49530);color:#0b0b14;font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;border:none;border-radius:12px;padding:13px 20px;cursor:pointer;transition:all .2s;flex:1}
.btn-pdf {background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:#d4a843;font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;border-radius:12px;padding:13px 20px;cursor:pointer;transition:all .2s;flex:1}
.btn-pdf:hover{background:rgba(212,168,67,.18);transform:translateY(-1px)}
.btn-copy:hover{background:linear-gradient(135deg,#e0b84e,#d4a843);transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,168,67,.3)}
.btn-copy:active{transform:translateY(0)}
.copy-hint{font-size:10px;color:rgba(200,190,164,.35);text-align:center;line-height:1.5}

/* ── COPY SUCCESS ── */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,#17172a,#0e0e18);border:1px solid rgba(126,200,160,.35);border-radius:14px;padding:12px 22px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 40px rgba(0,0,0,.7);z-index:999;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-icon{font-size:20px}
.toast-text{font-family:'Playfair Display',serif;font-size:14px;color:#7ec8a0;font-style:italic}

/* ── ADMIN ── */
.adm-btn{position:fixed;bottom:14px;right:14px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:100}
.adm-btn:hover{border-color:rgba(212,168,67,.3);color:rgba(212,168,67,.6)}
.adm-panel{position:fixed;bottom:52px;right:14px;width:480px;max-height:80vh;overflow-y:auto;background:linear-gradient(155deg,#17172a,#0e0e18);border-radius:16px;border:1px solid rgba(212,168,67,.2);padding:20px;display:flex;flex-direction:column;gap:16px;z-index:100;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.adm-panel.h{display:none}
.adm-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(212,168,67,.5)}
.adm-sep{height:1px;background:rgba(212,168,67,.1)}
.adm-section{display:flex;flex-direction:column;gap:10px}
.adm-sec-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(212,168,67,.35)}
.adm-row{display:flex;gap:8px;align-items:flex-start}
.adm-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:8px 12px;font-family:'Raleway',sans-serif;font-size:11px;color:#c8bea4;outline:none;transition:border-color .2s}
.adm-input:focus{border-color:rgba(212,168,67,.45)}
.adm-input.sm{width:80px;flex:none}
.adm-textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,67,.2);border-radius:8px;padding:8px 12px;font-family:monospace;font-size:10px;color:#c8bea4;outline:none;resize:none;line-height:1.5}
.adm-textarea:focus{border-color:rgba(212,168,67,.45)}
.pos-entry{background:rgba(212,168,67,.04);border:1px solid rgba(212,168,67,.1);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.pos-entry-header{display:flex;justify-content:space-between;align-items:center}
.pos-entry-num{font-size:10px;font-weight:700;color:rgba(212,168,67,.5)}
.btn-del{background:rgba(224,112,112,.1);border:1px solid rgba(224,112,112,.2);color:#e07070;border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s}
.btn-del:hover{background:rgba(224,112,112,.2)}
.toggle-group{display:flex;gap:6px}
.tog{font-family:'Raleway',sans-serif;font-size:10px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid rgba(212,168,67,.15);background:rgba(255,255,255,.03);color:#5a5570;cursor:pointer;transition:all .2s}
.tog.on{background:rgba(212,168,67,.14);border-color:rgba(212,168,67,.4);color:#d4a843}
.adm-actions{display:flex;gap:8px}
.btn-add{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.25);color:#d4a843;border-radius:9px;padding:8px 16px;font-family:'Raleway',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;flex:1}
.btn-add:hover{background:rgba(212,168,67,.15)}
.btn-apply{background:linear-gradient(135deg,#d4a843,#c49530);color:#0b0b14;border:none;border-radius:9px;padding:9px 20px;font-family:'Raleway',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;flex:1}
.btn-apply:hover{background:linear-gradient(135deg,#e0b84e,#d4a843)}
.adm-meta{display:flex;flex-direction:column;gap:8px}

@media(max-width:680px){
  .page-header,.card,.submit-section{width:100%}
  .positions{padding:16px 14px 20px;gap:24px}
  .pos-body{flex-direction:column}
  .btn-row{flex-direction:column}
  .adm-panel{width:calc(100vw - 28px);right:14px}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-brand">
    <div class="page-brand-icon">♟</div>
    <div>
      <div class="page-brand-name"><em>Stage Porticcio 2026</em></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="positions" id="positions"></div>
</div>

<div class="submit-section">
  <div class="name-row">
    <input class="name-input" id="studentName" type="text" placeholder="Ton prénom (pour le PDF)…">
  </div>
  <div class="btn-row">
    <button class="btn-copy" onclick="copyAnswers()">📋 Copier mes réponses</button>
    <button class="btn-pdf"  onclick="exportPDF()">📄 Exporter en PDF</button>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-icon">✅</div>
  <div class="toast-text">Réponses copiées ! Colle-les en commentaire.</div>
</div>

<!-- Admin panel -->
<button class="adm-btn" onclick="toggleAdm()">⚙</button>
<div class="adm-panel h" id="admpanel">
  <div class="adm-title">⚙ Configurer le cours</div>
  
  <div class="adm-meta">
    <div class="adm-sec-title">Titre du cours</div>
    <input class="adm-input" id="admTitle" type="text" placeholder="Ex: Thème — Activité des pièces" value="Cours du jour">
    <input class="adm-input" id="admSubtitle" type="text" placeholder="Sous-titre" value="Analyse les positions et donne ta réponse">
  </div>

  <div class="adm-sep"></div>

  <div class="adm-section">
    <div class="adm-sec-title">Positions</div>
    <div id="admEntries"></div>
    <div class="adm-actions">
      <button class="btn-add" onclick="addEntry()">+ Ajouter une position</button>
    </div>
  </div>

  <div class="adm-sep"></div>
  <div class="adm-actions">
    <button class="btn-apply" onclick="applyConfig()">▶ Appliquer</button>
  </div>
</div>

// ── FEN PARSER ───────────────────────────────────────────────
const FM={K:'wK',Q:'wQ',R:'wR',B:'wB',N:'wN',P:'wP',k:'bK',q:'bQ',r:'bR',b:'bB',n:'bN',p:'bP'};
function parseFen(fen){
  const rows=fen.trim().split(/\s+/)[0].split('/');
  if(rows.length!==8)return null;
  const board=[];
  for(const row of rows){
    const rank=[];
    for(const ch of row){
      if(/\d/.test(ch)){for(let i=0;i<+ch;i++)rank.push('');}
      else{const pc=FM[ch];if(!pc)return null;rank.push(pc);}
    }
    if(rank.length!==8)return null;
    board.push(rank);
  }
  return board;
}

// ── RENDER BOARD ─────────────────────────────────────────────
function renderBoard(container, fen, turn){
  const board = parseFen(fen);
  const flip  = turn === 'b';
  const files = flip ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];

  container.innerHTML = `
    <div class="board-wrap">
      <div class="rlabels" id="rl_${container.id}"></div>
      <div class="board" id="bd_${container.id}"></div>
      <div></div>
      <div class="flabels" id="fl_${container.id}"></div>
    </div>`;

  const rl = container.querySelector('.rlabels');
  const bd = container.querySelector('.board');
  const fl = container.querySelector('.flabels');

  for(let r=0;r<8;r++){const d=document.createElement('div');d.className='rl';d.textContent=flip?r+1:8-r;rl.appendChild(d);}
  files.forEach(f=>{const d=document.createElement('div');d.className='fl';d.textContent=f;fl.appendChild(d);});

  if(!board){bd.innerHTML='<div style="color:#e07070;font-size:10px;padding:8px">FEN invalide</div>';return;}
  for(let ri=0;ri<8;ri++)for(let fi=0;fi<8;fi++){
    const ar=flip?7-ri:ri,af=flip?7-fi:fi,pc=board[ar][af];
    const sq=document.createElement('div');
    sq.className='sq '+((ri+fi)%2===0?'lt':'dk');
    if(pc&&SV[pc])sq.innerHTML=SV[pc];
    bd.appendChild(sq);
  }
}

// ── BUILD PAGE ───────────────────────────────────────────────
let CONFIG = JSON.parse(JSON.stringify(DEFAULT));

function buildPage(){
  const container = document.getElementById('positions');
  container.innerHTML = '';

  CONFIG.positions.forEach((pos, i) => {
    const block = document.createElement('div');
    block.className = 'pos-block';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'pos-header';
    const turnLabel = pos.turn === 'w' ? 'Trait aux blancs' : 'Trait aux noirs';
    hdr.innerHTML = `
      <div class="pos-num">${i+1}</div>
      <div class="pos-label">${pos.label}</div>
      <div class="turn-dot ${pos.turn}" title="${turnLabel}"></div>
      <div class="turn-label">${pos.turn==='w'?'Blancs':'Noirs'}</div>`;
    block.appendChild(hdr);

    // Board
    const boardContainer = document.createElement('div');
    boardContainer.id = 'board_' + i;
    block.appendChild(boardContainer);
    
    // Comment
    const cs = document.createElement('div');
    cs.className = 'comment-section';
    cs.innerHTML = `
      <div class="comment-label">✏ Ta réponse</div>
      <textarea class="comment-input" id="answer_${i}" placeholder="Décris ton analyse, les coups que tu envisages, le plan…"></textarea>`;
    block.appendChild(cs);

    // Separator (not after last)
    if(i < CONFIG.positions.length - 1){
      const sep = document.createElement('div');
      sep.className = 'pos-sep';
      block.appendChild(sep);
    }

    container.appendChild(block);

    // Render board after DOM insertion
    setTimeout(() => renderBoard(boardContainer, pos.fen, pos.turn), 0);
  });
}

// ── COPY ANSWERS ─────────────────────────────────────────────
function copyAnswers(){
  const name = document.getElementById('studentName').value.trim();
  let text = `📚 ${CONFIG.title}\n`;
  if(name) text += `👤 ${name}\n`;
  text += '\n';
  CONFIG.positions.forEach((pos, i) => {
    const answer = (document.getElementById('answer_' + i)?.value || '').trim();
    text += `Position ${i+1} — ${pos.label}\n`;
    text += answer ? `➜ ${answer}` : '(pas de réponse)';
    text += '\n\n';
  });
  navigator.clipboard.writeText(text.trim()).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  });
}

// ── ADMIN ─────────────────────────────────────────────────────
let admEntries = JSON.parse(JSON.stringify(DEFAULT.positions));

function toggleAdm(){
  const p = document.getElementById('admpanel');
  p.classList.toggle('h');
  if(!p.classList.contains('h')) renderAdmEntries();
}

function renderAdmEntries(){
  const c = document.getElementById('admEntries');
  c.innerHTML = '';
  admEntries.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'pos-entry';
    div.style.marginBottom = '8px';
    div.innerHTML = `
      <div class="pos-entry-header">
        <span class="pos-entry-num">Position ${i+1}</span>
        <button class="btn-del" onclick="delEntry(${i})">✕ Supprimer</button>
      </div>
      <input class="adm-input" id="ae_label_${i}" type="text" placeholder="Question / description" value="${entry.label.replace(/"/g,'&quot;')}">
      <textarea class="adm-textarea" id="ae_fen_${i}" rows="2" placeholder="FEN…">${entry.fen}</textarea>
      <div style="display:flex;align-items:center;gap:10px;margin-top:2px">
        <span class="adm-sec-title">Trait :</span>
        <div class="toggle-group">
          <button class="tog ${entry.turn==='w'?'on':''}" id="ae_tw_${i}" onclick="setEntryTurn(${i},'w')">⬜ Blancs</button>
          <button class="tog ${entry.turn==='b'?'on':''}" id="ae_tb_${i}" onclick="setEntryTurn(${i},'b')">⬛ Noirs</button>
        </div>
      </div>`;
    c.appendChild(div);
  });
}

function setEntryTurn(i, t){
  admEntries[i].turn = t;
  document.getElementById('ae_tw_'+i).className='tog'+(t==='w'?' on':'');
  document.getElementById('ae_tb_'+i).className='tog'+(t==='b'?' on':'');
}

function addEntry(){
  admEntries.push({fen:'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', turn:'w', label:'Nouvelle position'});
  renderAdmEntries();
}

function delEntry(i){
  admEntries.splice(i,1);
  renderAdmEntries();
}

function applyConfig(){
  // Collect values
  admEntries.forEach((e,i) => {
    e.label = document.getElementById('ae_label_'+i)?.value || e.label;
    e.fen   = document.getElementById('ae_fen_'+i)?.value.trim() || e.fen;
  });
  CONFIG.title    = document.getElementById('admTitle').value || CONFIG.title;
  CONFIG.subtitle = document.getElementById('admSubtitle').value || CONFIG.subtitle;
  CONFIG.positions = JSON.parse(JSON.stringify(admEntries));
  buildPage();
  document.getElementById('admpanel').classList.add('h');
}


// ── EXPORT PDF ───────────────────────────────────────────────
function exportPDF(){
  const name = document.getElementById('studentName').value.trim() || 'Élève';
  const date = new Date().toLocaleDateString('fr-FR');

  // Collect canvas snapshots of boards
  const boardEls = document.querySelectorAll('.board');
  const boardImages = [];
  boardEls.forEach(bd => {
    const canvas = document.createElement('canvas');
    canvas.width = 240; canvas.height = 240;
    const ctx = canvas.getContext('2d');
    const size = 30;
    const sqs = bd.querySelectorAll('.sq');
    sqs.forEach((sq, idx) => {
      const r = Math.floor(idx/8), f = idx%8;
      ctx.fillStyle = (r+f)%2===0 ? '#f0d9b5' : '#b58863';
      ctx.fillRect(f*size, r*size, size, size);
      const svg = sq.querySelector('svg');
      if(svg){
        const blob = new Blob([svg.outerHTML], {type:'image/svg+xml'});
        const url  = URL.createObjectURL(blob);
        const img  = new Image();
        img.src = url;
        // draw sync via canvas trick
        boardImages.push({ctx, x:f*size+2, y:r*size+2, w:size-4, h:size-4, img, url});
      }
    });
    boardImages.push({canvas, idx: boardImages.length});
  });

    label: pos.label,

    answer: document.getElementById('answer_'+i)?.value?.trim() || ''
